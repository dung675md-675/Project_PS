name: CI/CD - Build, Test & Deploy

# Tự động chạy mỗi khi có push lên nhánh main
on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      # Bước 1: Lấy code mới nhất về (thay cho "git pull" thủ công)
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Tạo virtual environment bằng Python có sẵn trên VM
      - name: Set up virtual environment
        run: python3 -m venv venv

      # Bước 3: Cài thư viện cần thiết vào venv (không đụng tới Python hệ thống)
      - name: Install dependencies
        run: |
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
          ./venv/bin/pip install pytest

      # Bước 4: Chạy test - nếu test fail, pipeline dừng lại,
      - name: Run tests
        run: ./venv/bin/pytest -v

      # Bước 5: Build Docker image
      - name: Build Docker image
        run: |
          docker build --no-cache \
            -t devops-demo-app:${{ github.sha }} \
            -t devops-demo-app:latest .

      # Bước 6: Gỡ container cũ (chỉ gỡ đúng container của app này)
      - name: Stop old container (if exists)
        run: docker rm -f devops-demo-app || true

      # Bước 7: Chạy container mới
      - name: Run new container
        run: docker run -d --name devops-demo-app -p 80:5000 devops-demo-app:latest

      # Bước 8: Dọn các image cũ không dùng nữa, tránh đầy ổ đĩa
      - name: Clean up unused images
        run: docker image prune -f
